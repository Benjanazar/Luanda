<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/jpeg" href="assets/favicon.jpeg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pago completado — Luanda Shop</title>
<style>
*{margin:0;box-sizing:border-box}
body{background:#0d0d0d;color:#f5f0e8;font-family:'Georgia',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px}
.icon{font-size:64px;margin-bottom:24px}
h1{font-size:clamp(24px,4vw,36px);font-weight:400;color:#c9a84c;margin-bottom:12px}
p{font-size:15px;color:rgba(245,240,232,.65);line-height:1.7;max-width:440px;margin-bottom:32px}
a{display:inline-block;background:#c9a84c;color:#0d0d0d;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;padding:14px 28px;border-radius:2px}
a:hover{background:#e0be6a}
</style>
</head>
<body>
<div class="icon">✓</div>
<h1>¡Pago completado!</h1>
<p>Tu pedido ha sido recibido correctamente. Te contactaremos por WhatsApp para coordinar la entrega.</p>
<a href="tienda.html">Seguir comprando</a>
<script>
// Registrar ventas en el servidor y limpiar carrito
(async () => {
  try {
    const pending = JSON.parse(localStorage.getItem('luanda_pending_cart') || '[]');
    if (pending.length) {
      const items = pending.map(i => ({ name: i.name, qty: i.qty }));
      await fetch('/api/stock-buy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items })
      });
      localStorage.removeItem('luanda_pending_cart');
      localStorage.removeItem('luanda_cart');
    }
  } catch(e) {}
})();
</script>
</body>
</html>
